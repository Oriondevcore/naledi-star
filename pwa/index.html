<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080809">
  <meta name="description" content="Naledi Star — your care connection from Orion Ventures S.A.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192.svg">
  <title>Naledi Star</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- TOAST CONTAINER -->
  <div class="toast-container" id="toast-container"></div>

  <!-- WELCOME (not logged in) -->
  <div class="screen active" id="screen-landing">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px;padding:40px 24px;">
      <img src="/icons/naledi-full.jpg" alt="Naledi" style="width:150px;height:150px;border-radius:50%;object-fit:cover;border:3px solid #00e5ff;box-shadow:0 0 40px rgba(0,229,255,0.3);">
      <h1 class="app-title">Naledi Star</h1>
      <p class="subtitle">Your care connection — from Orion Ventures S.A.</p>
      <div style="height:1px;width:60px;background:var(--border-default);"></div>
      <p style="color:var(--text-muted);font-size:15px;max-width:280px;line-height:1.6;">
        Tap your personal link from WhatsApp or scan your QR code to get started.
      </p>
      <div style="flex:1;min-height:40px;"></div>
      <p style="font-size:12px;color:var(--text-muted);opacity:0.5;">
        Need help? Contact Graham on WhatsApp
      </p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="screen-dashboard">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;">
      <h1 style="font-size:22px;font-weight:900;" class="app-title">Naledi Star</h1>
      <button class="btn btn-small btn-outline" id="logout-btn">Exit</button>
    </div>
    <div class="dashboard" id="dashboard-content">
      <p style="color:var(--text-muted);text-align:center;padding:40px 0;">Loading...</p>
    </div>
  </div>

  <!-- CHAT -->
  <div class="screen" id="screen-chat">
    <div class="chat-header">
      <button class="back" id="chat-back">&larr;</button>
      <h2 id="chat-partner-name">Chat</h2>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
      <button class="btn btn-primary btn-small" id="chat-send">Send</button>
    </div>
    <input type="hidden" id="chat-partner-id">
  </div>

  <!-- SOS MODAL -->
  <div class="modal-overlay" id="sos-modal">
    <div class="modal">
      <h2>Send Emergency Alert?</h2>
      <p>Your carer will be notified immediately.</p>
      <div class="btn-group">
        <button class="btn btn-secondary" id="sos-cancel">Cancel</button>
        <button class="btn btn-danger" id="sos-confirm">Send Alert</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
