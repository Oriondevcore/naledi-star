<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>opencode</title>
<meta name="theme-color" content="#080809">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080809;--srf:#111114;--ac:#00e5ff;--tx:#e0e0e0;--td:#666;--inp:#1a1a1e}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden}
body{display:flex;flex-direction:column}
#hd{padding:.7rem 1rem;background:var(--srf);display:flex;align-items:center;gap:.5rem;flex-shrink:0}
#hd h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,var(--ac),#80f);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#hd .st{font-size:.6rem;color:var(--td);margin-left:auto;display:flex;align-items:center;gap:4px}
#hd .tts-toggle{font-size:.6rem;background:var(--inp);border:1px solid #333;color:var(--td);padding:2px 6px;border-radius:8px;cursor:pointer;border:none;font-family:inherit}
#hd .tts-toggle.on{background:var(--ac);color:#000}
#ms{flex:1;overflow-y:auto;padding:.5rem .7rem;display:flex;flex-direction:column;gap:.4rem;scroll-behavior:smooth}
.msg{max-width:85%;padding:.55rem .75rem;border-radius:12px;line-height:1.4;font-size:.85rem;word-wrap:break-word;animation:fi .15s}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.msg.mine{align-self:flex-end;background:var(--ac);color:#000;border-bottom-right-radius:3px}
.msg.theirs{align-self:flex-start;background:var(--inp);color:var(--tx);border-bottom-left-radius:3px}
.msg .tm{font-size:.5rem;color:var(--td);margin-top:3px;display:flex;align-items:center;gap:4px;justify-content:flex-end}
.msg.mine .tm{color:rgba(0,0,0,.4)}
.msg .speak-btn{background:none;border:none;color:inherit;font-size:.55rem;cursor:pointer;opacity:.5;padding:0;line-height:1}
.msg .speak-btn:active{opacity:1}
.typing{color:var(--td);font-size:.75rem;padding:.3rem .7rem;display:none;font-style:italic}
#bar{display:flex;gap:.3rem;padding:.5rem .7rem;padding-bottom:calc(.5rem + env(safe-area-inset-bottom,0));background:var(--srf);flex-shrink:0;align-items:center}
#bar input{flex:1;background:var(--inp);border:1px solid #333;color:var(--tx);padding:.6rem .8rem;border-radius:20px;font-size:.9rem;outline:none}
#bar input:focus{border-color:var(--ac)}
#bar .btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--ac);color:#000;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:opacity .15s}
#bar .btn:disabled{opacity:.4}
#bar .btn.mic{background:var(--inp);color:var(--tx);border:1px solid #333;font-size:.8rem}
#bar .btn.mic.listening{background:#ff4444;color:#fff;border-color:#ff4444;animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(255,68,68,0)}100%{box-shadow:0 0 0 0 rgba(255,68,68,0)}}
</style>
</head>
<body>
<div id="hd"><h1>opencode</h1><div style="display:flex;align-items:center;gap:6px;margin-left:auto"><button class="tts-toggle" id="ttsBtn">TTS</button><div class="st" id="status">---</div></div></div>
<div id="ms"></div>
<div class="typing" id="typing">opencode is typing...</div>
<div id="bar">
  <button class="btn mic" id="micBtn">🎤</button>
  <input type="text" id="inp" placeholder="Message opencode..." autocomplete="off">
  <button class="btn" id="snd">▶</button>
</div>
<script>
(function(){
var MS = document.getElementById('ms');
var INP = document.getElementById('inp');
var SND = document.getElementById('snd');
var STS = document.getElementById('status');
var MIC = document.getElementById('micBtn');
var TTS = document.getElementById('ttsBtn');
var lastSince = '1970-01-01';
var ttsOn = false;
var recognition = null;
var listening = false;

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function speak(text) {
  if (!ttsOn) return;
  try {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-ZA';
    u.rate = 1.1;
    speechSynthesis.speak(u);
  } catch(e) {}
}

function fmt(t) {
  if (!t) return '';
  try {
    return new Date(t + 'Z').toLocaleTimeString('en-ZA', {
      hour: '2-digit',
      minute: '2-digit',
      timeZone: 'Africa/Johannesburg'
    });
  } catch(e) { return ''; }
}

function addMsg(sender, text, id) {
  var d = document.createElement('div');
  d.className = 'msg ' + (sender === 'mine' ? 'mine' : 'theirs');
  if (id) d.dataset.id = id;
  var tm = sender === 'mine' ? 'now' : fmt(new Date().toISOString());
  var msgDiv = document.createElement('div');
  msgDiv.textContent = text;
  var tmDiv = document.createElement('div');
  tmDiv.className = 'tm';
  tmDiv.textContent = tm;
  var spk = document.createElement('button');
  spk.className = 'speak-btn';
  spk.textContent = '\u25B6';
  spk.onclick = function() { speak(text); };
  tmDiv.appendChild(spk);
  d.appendChild(msgDiv);
  d.appendChild(tmDiv);
  MS.appendChild(d);
  MS.scrollTop = MS.scrollHeight;
}

function toggleTts() {
  ttsOn = !ttsOn;
  TTS.classList.toggle('on', ttsOn);
}

function toggleMic() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addMsg('theirs', '[Speech not supported]');
    return;
  }
  if (listening) {
    recognition.stop();
    return;
  }
  if (!recognition) {
    recognition = new SR();
    recognition.lang = 'en-ZA';
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.onresult = function(e) {
      INP.value = e.results[0][0].transcript;
      listening = false;
      MIC.classList.remove('listening');
      send();
    };
    recognition.onerror = function() {
      listening = false;
      MIC.classList.remove('listening');
    };
    recognition.onend = function() {
      listening = false;
      MIC.classList.remove('listening');
    };
  }
  listening = true;
  MIC.classList.add('listening');
  try { recognition.start(); } catch(e) {
    listening = false;
    MIC.classList.remove('listening');
  }
}

function send() {
  var msg = INP.value.trim();
  if (!msg || INP.dataset.loading) return;
  INP.value = '';
  INP.dataset.loading = '1';
  SND.disabled = true;
  fetch('/oc/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: msg })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.status === 'ok' && d.id) {
      addMsg('mine', msg, d.id);
      lastSince = d.created_at || new Date().toISOString().replace('T', ' ').slice(0, 19);
    } else {
      addMsg('theirs', '[Error sending]');
    }
    delete INP.dataset.loading;
    SND.disabled = false;
    INP.focus();
  }).catch(function() {
    addMsg('theirs', '[Connection error]');
    delete INP.dataset.loading;
    SND.disabled = false;
    INP.focus();
  });
}

function renderMsg(m) {
  if (document.querySelector('[data-id="' + m.id + '"]')) return;
  var isMine = m.tags && m.tags.indexOf('graham_chat') !== -1;
  var div = document.createElement('div');
  div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
  div.dataset.id = m.id;
  var msgDiv = document.createElement('div');
  msgDiv.textContent = m.content;
  div.appendChild(msgDiv);
  var tmDiv = document.createElement('div');
  tmDiv.className = 'tm';
  tmDiv.textContent = fmt(m.created_at);
  var spk = document.createElement('button');
  spk.className = 'speak-btn';
  spk.textContent = '\u25B6';
  spk.onclick = (function(t) { return function() { speak(t); }; })(m.content);
  tmDiv.appendChild(spk);
  div.appendChild(tmDiv);
  MS.appendChild(div);
  MS.scrollTop = MS.scrollHeight;
  if (!isMine) speak(m.content);
}

INP.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') send();
});

SND.addEventListener('click', send);
MIC.addEventListener('click', toggleMic);
TTS.addEventListener('click', toggleTts);

// Load history then connect SSE stream
STS.textContent = 'connect...';
fetch('/oc/messages')
.then(function(r) { return r.json(); })
.then(function(d) {
  if (d.messages) {
    var msgs = d.messages.slice(-20);
    for (var i = 0; i < msgs.length; i++) renderMsg(msgs[i]);
    if (msgs.length) lastSince = msgs[msgs.length - 1].created_at;
  }
  STS.textContent = 'online';
})
.catch(function() { STS.textContent = 'offline'; });

// Real-time stream via SSE
function connectSSE() {
  var es = new EventSource('/oc/events?since=' + encodeURIComponent(lastSince));
  es.onmessage = function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.type === 'connected') return;
      renderMsg(data);
      if (data.created_at > lastSince) lastSince = data.created_at;
    } catch(e) {}
  };
  es.onerror = function() {
    STS.textContent = 'reconnect...';
    es.close();
    setTimeout(connectSSE, 3000);
  };
}
setTimeout(connectSSE, 500);
})();
</script>
</body>
</html>
